# Configuration variables

tickers:
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - NVDA
  - TSLA
  - META

data:
  window_size: 30
  train_start_date: "2021-06-07"
  train_end_date: "2024-03-31"
  val_start_date: "2024-04-01"
  val_end_date: "2025-03-31"
  test_start_date: "2025-04-01"
  test_end_date: "2026-03-25"

scheduler:
  timezone: "US/Eastern"
  market_close_run_time: "16:30"

models:
  random_forest:
    n_estimators: 100
    max_depth: 10
  xgboost:
    learning_rate: 0.1
    n_estimators: 200
  lstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.2
    learning_rate: 0.001
    epochs: 50
    batch_size: 32
